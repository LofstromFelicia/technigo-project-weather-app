<!DOCTYPE html>
<html>

<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Weather app</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>
  <h1>Weather app</h1>

  <div id="weather-container">
    <p id="description">Loading weather...</p>
    <img id="weather-icon" src="data:image/gif;base64,R0lGODlhAQABAIAAAAAAAP///yH5BAEAAAAALAAAAAABAAEAAAIBRAA7"
      alt="weather-icon">
    <h1 id="temperature">0°</h1>
    <h2 id="city">City</h2>

    <p id="outfit-tip"></p>

    <div class="sun-times">
      <p>Sunrise: <span id="sunrise">--:--</span></p>
      <p>Sunset: <span id="sunset">--:--</span></p>
    </div>

    <div id="forecast"></div>
  </div>

  <script src="script.js"></script>
</body>

</html>
