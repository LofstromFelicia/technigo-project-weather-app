<!DOCTYPE html>
<html lang="sv">

<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Väderappen | Live Weather</title>

  <link
    href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;800&family=Montserrat:wght@700;800&display=swap"
    rel="stylesheet">

  <link rel="stylesheet" href="style.css">

  <link rel="icon" type="image/svg+xml" href="./assets/sol-och-moln.svg">
</head>

<body>
  <header>
    <h1 class="app-title">Väderappen</h1>

    <div class="search-box">
      <input type="text" id="search-input" placeholder="Sök stad...">
      <button id="search-btn" aria-label="Sök stad">🔍</button>
    </div>
  </header>

  <main>
    <div id="weather-container">

      <div class="current-weather-box">

        <div class="current-weather-text">
          <h2 id="city">City</h2>
          <p id="description">Loading weather...</p>

          <div class="temp-block">
            <p id="temperature">0°C</p>
            <p class="feels-like-top">Känns som <span id="feels-like">0°C</span></p>
          </div>

          <div id="hourly-forecast">
            <div class="hour-item">
              <span class="hour-time">Om 1 tim</span>
              <img class="hour-icon" src="./assets/dag.svg" alt="Weather Icon">
              <span class="hour-temp">14°C</span>
            </div>
            <div class="hour-item">
              <span class="hour-time">Om 2 tim</span>
              <img class="hour-icon" src="./assets/aska.svg" alt="Weather Icon">
              <span class="hour-temp">12°C</span>
            </div>
          </div>

          <div class="outfit-container">
            <span class="outfit-label">Kläder efter väder:</span>
            <p id="outfit-tip"></p>
          </div>
        </div>

        <img id="weather-icon" src="data:image/gif;base64,R0lGODlhAQABAIAAAAAAAP///yH5BAEAAAAALAAAAAABAAEAAAIBRAA7"
          alt="weather-icon">

      </div>

      <div class="weather-details">
        <div class="detail-item">
          <span>Högst / Lägst:</span>
          <span id="temp-max-min">0°C / 0°C</span>
        </div>
        <div class="detail-item">
          <span>Regnrisk:</span>
          <span id="pop">0%</span>
        </div>
        <div class="detail-item">
          <span>Vind:</span>
          <span id="wind">0 m/s</span>
        </div>
        <div class="detail-item">
          <span>Luftfuktighet</span>
          <span id="humidity">0%</span>
        </div>
        <div class="detail-item">
          <span>UV-index:</span>
          <span id="uv-index">0</span>
        </div>
      </div>

      <div id="uv-warning" class="uv-bubble" style="display: none;"></div>

      <div class="sun-times">
        <p>Soluppgång: <span id="sunrise">--:--</span></p>
        <p>Solnedgång: <span id="sunset">--:--</span></p>
      </div>

      <div id="forecast"></div>
    </div>
  </main>

  <footer>
    <p>Created with 🤍 by Felicia Löfström | Web Development Project 2026</p>
  </footer>

  <script src="script.js"></script>
</body>

</html>
